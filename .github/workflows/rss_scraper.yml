name: RSS scraper + index builder

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  build-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Scrape RSS and upload to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python rss_to_supabase.py

      - name: Build embeddings
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python build_embeddings.py

      - name: Build FAISS index
        run: |
          python build_faiss_index.py

      - name: Upload index artifacts
        uses: actions/upload-artifact@v4
        with:
          name: news-search-index
          path: |
            news_embeddings.npy
            news_metadata.parquet
            news_faiss.index
